[gcode_macro LOAD_FILAMENT]
description: Load filament and extrude
gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(240)|float %}
    {% set LOAD_SPEED = params.SPEED|default(300)|float %}
    {% set LOAD_LENGTH = params.LENGTH|default(60)|float %}
    {% set EXTRUDE_LENGTH = params.EXTRUDE|default(50)|float %}
    
    SAVE_GCODE_STATE NAME=load_filament
    M117 Heating extruder...
    M109 S{EXTRUDER_TEMP}  # Heat and wait
    M117 Loading filament...
    M83  # Relative extrusion
    G1 E{LOAD_LENGTH} F{LOAD_SPEED}  # Fast load
    G1 E{EXTRUDE_LENGTH} F300  # Slow extrude to prime
    M117 Filament loaded
    RESTORE_GCODE_STATE NAME=load_filament

[gcode_macro UNLOAD_FILAMENT]
description: Unload filament with tip forming
gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(240)|float %}
    {% set UNLOAD_SPEED = params.SPEED|default(300)|float %}
    {% set UNLOAD_LENGTH = params.LENGTH|default(80)|float %}
    
    SAVE_GCODE_STATE NAME=unload_filament
    M117 Heating extruder...
    M109 S{EXTRUDER_TEMP}  # Heat and wait
    M117 Unloading filament...
    M83  # Relative extrusion
    G1 E5 F300  # Extrude a bit
    G1 E-10 F3000  # Quick retract to form tip
    G1 E-{UNLOAD_LENGTH} F{UNLOAD_SPEED}  # Unload
    M117 Filament unloaded
    RESTORE_GCODE_STATE NAME=unload_filament
