[include mainsail.cfg]
# This file contains common pin mappings for the BIGTREETECH Manta M8P V2.0
# To use this config, the firmware should be compiled for the
# STM32H723 with a "8KiB bootloader" and USB communication.

# This config is currently only correct for V2.0 boards
# 
# See docs/Config_Reference.md for a description of parameters.

# Manta M8P V2.0 (main board)
[mcu]
##	[X in MOTOR1] - B Motor
##	[Y in MOTOR2] - A Motor
##	[E in MOTOR8] - Extruder
##	Obtain definition by "ls /dev/serial/by-id/*" then unplug to verify
##--------------------------------------------------------------------
#serial: /dev/serial/by-id/YOU_DIDNT_CHANGE_ME_YET
canbus_uuid: 53f6a79a8f76
canbus_interface: can0

# EBB SB2209 CAN toolhead
[mcu EBBcan]
canbus_uuid: e06577a64bda
canbus_interface: can0


#restart_method: command
##--------------------------------------------------------------------

[printer]
kinematics: corexy
max_velocity: 300  
max_accel: 3000    			#Max 4000
max_z_velocity: 15 			#Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

#[temperature_sensor MCU]
#sensor_type: temperature_mcu

#[temperature_sensor SoC]
#sensor_type: temperature_host
[temperature_sensor MCU]
sensor_type: temperature_mcu
sensor_mcu: mcu

[temperature_sensor CB1]
sensor_type: temperature_host

[temperature_sensor EBB_NTC]
sensor_type: Generic 3950
sensor_pin: EBBcan: PA2


#####################################################################
# 	X/Y Stepper Settings
#####################################################################

## X Stepper on Motor1(B Motor)
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: ^EBBcan: gpio24
position_min: 0
##--------------------------------------------------------------------

##	Uncomment below for 250mm build
#position_endstop: 250
#position_max: 250

##	Uncomment for 300mm build
#position_endstop: 300
#position_max: 300

##	Uncomment for 350mm build
position_endstop: 350
position_max: 350

##--------------------------------------------------------------------
homing_speed: 25   #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_x]
uart_pin: PC13
interpolate: True
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

## Y Stepper on Motor2 (A Motor)
[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
endstop_pin: ^PF4
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
position_min: 0
##--------------------------------------------------------------------

##	Uncomment for 250mm build
#position_endstop: 250
#position_max: 250

##	Uncomment for 300mm build
#position_endstop: 300
#position_max: 300

##	Uncomment for 350mm build
position_endstop: 350
position_max: 350

##--------------------------------------------------------------------
homing_speed: 25  #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_y]
uart_pin: PE3
interpolate: True
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left on MOTOR3_A
[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
endstop_pin: probe:z_virtual_endstop  # Changed for Tap
##  Z-position of nozzle (in mm) to z-endstop trigger point relative to print surface (Z0)
##  (+) value = endstop above Z0, (-) value = endstop below
##	Increasing position_endstop brings nozzle closer to the bed
##  After you run Z_ENDSTOP_CALIBRATE, position_endstop will be stored at the very end of your config
#position_endstop: -0.5  # Commented out for Tap
##--------------------------------------------------------------------

##	Uncomment below for 250mm build
#position_max: 240

##	Uncomment below for 300mm build
#position_max: 290

##	Uncomment below for 350mm build
position_max: 340

##--------------------------------------------------------------------
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z]
uart_pin: PB9
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##	Z1 Stepper - Rear Left on Motor5
[stepper_z1]
step_pin: PG13
dir_pin: !PG12
enable_pin: !PG15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z1]
uart_pin: PG14
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##	Z2 Stepper - Rear Right on Motor6
[stepper_z2]
step_pin: PG9
dir_pin: PD7
enable_pin: !PG11
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z2]
uart_pin: PG10
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##	Z3 Stepper - Front Right on Motor4 (Motor7 socket is bad)
[stepper_z3]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z3]
uart_pin: PB5
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   EBB SB2209 CAN Toolhead (RP2040)
#####################################################################

[temperature_sensor EBB_NTC]
sensor_type: Generic 3950
sensor_pin: EBBcan: gpio28

[adxl345]
cs_pin: EBBcan: gpio1
spi_software_sclk_pin: EBBcan: gpio2
spi_software_mosi_pin: EBBcan: gpio0
spi_software_miso_pin: EBBcan: gpio3
axes_map: z,-y,x

[resonance_tester]
probe_points: 175, 175, 20  # Adjust for your 350mm build
accel_chip: adxl345

[extruder]
step_pin: EBBcan: gpio18
dir_pin: EBBcan: gpio19
enable_pin: !EBBcan: gpio17
rotation_distance: 22.4521621
gear_ratio: 50:10
microsteps: 16
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBcan: gpio7
sensor_type: MAX31865
sensor_pin: EBBcan: gpio9
spi_software_sclk_pin: EBBcan: gpio10
spi_software_mosi_pin: EBBcan: gpio8
spi_software_miso_pin: EBBcan: gpio11
rtd_nominal_r: 1000
rtd_reference_r: 4300
rtd_num_of_wires: 2
min_temp: 0
max_temp: 300
min_extrude_temp: 170
max_extrude_only_distance: 200.0
max_extrude_cross_section: 5.0
max_power: 1.0
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982

[tmc2209 extruder]
uart_pin: EBBcan: gpio20
run_current: 0.650
stealthchop_threshold: 0  # Change to 0 for Voron (no stealthchop)

[fan]
pin: EBBcan: gpio13
kick_start_time: 0.5
off_below: 0.10

[heater_fan hotend_fan]
pin: EBBcan: gpio14
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0

# Optional: Additional 4-wire fan
#[fan_generic 4W_FAN0]
#pin: EBBcan: gpio15
#tachometer_pin: EBBcan: gpio12

# Optional: Neopixel LEDs
[neopixel hotend_rgb]
pin: EBBcan: gpio16
chain_count: 3
color_order: GRB

# If using BLTouch (uncomment if needed)
#[bltouch]
#sensor_pin: ^EBBcan: gpio21
#control_pin: EBBcan: gpio22

# If using Tap or inductive probe on toolhead (uncomment if needed)
#[probe]
#pin: ^EBBcan: gpio6
#x_offset: 0
#y_offset: 0
#z_offset: 0
#speed: 10.0
#samples: 3
#samples_result: median
#sample_retract_dist: 3.0
#samples_tolerance: 0.006
#samples_tolerance_retries: 3

#####################################################################
# 	Bed Heater
#####################################################################

[heater_bed]
##	SSR Pin - HE1
heater_pin: PA1
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
## Use "Generic 3950" for NTC 100k 3950 thermistors
sensor_type: Generic 3950
sensor_pin: PB1
##  Adjust max_power so it doesn't exceed the SSR rating. The Omron G3NA-210B-DC5 SSR is rated at 4 amps without a heatsink.
##  The formula is "4 / (Wattage_of_bed_heater / Mains_voltage) = max_power"
##  If max_power is greater than 1.0, use 1.0
max_power: 0.6
min_temp: 0
max_temp: 120
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769

#####################################################################
# 	Bed Mesh
#####################################################################

[bed_mesh]
speed: 300
horizontal_move_z: 10
mesh_min: 40, 40
mesh_max: 310, 310
fade_start: 0.6
fade_end: 10.0
probe_count: 5,5
algorithm: bicubic

#####################################################################
# 	Probe
#####################################################################

[probe]
##	Voron Tap on EBB Toolhead
pin: ^EBBcan: gpio22
x_offset: 0
y_offset: 0
#z_offset: 0  # Will be calibrated with PROBE_CALIBRATE
speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.010          
samples_tolerance_retries: 5      
activate_gcode:
    {% set PROBE_TEMP = 220 %}
    {% set MAX_TEMP = PROBE_TEMP + 5 %}
    {% set ACTUAL_TEMP = printer.extruder.temperature %}
    {% set TARGET_TEMP = printer.extruder.target %}

    {% if TARGET_TEMP > PROBE_TEMP %}
        { action_respond_info('Extruder temperature target of %.1fC is too high, lowering to %.1fC' % (TARGET_TEMP, PROBE_TEMP)) }
        M109 S{ PROBE_TEMP }
    {% else %}
        {% if ACTUAL_TEMP > MAX_TEMP %}
            { action_respond_info('Extruder temperature %.1fC is still too high, waiting until below %.1fC' % (ACTUAL_TEMP, MAX_TEMP)) }
            TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={ MAX_TEMP }
        {% endif %}
    {% endif %}

#####################################################################
# 	Filament Sensor
#####################################################################

## Formbot filament sensor on EBB toolhead
## Connected to GND and gpio21 on EBB SB2209 CAN (probe connector)
## Tap uses gpio22, filament sensor uses gpio21 - no conflict
[filament_switch_sensor filament_sensor]
switch_pin: ^EBBcan: gpio21
pause_on_runout: False
runout_gcode:
    RESPOND MSG="Filament runout detected - cancelling print"
    CANCEL_PRINT
insert_gcode:
    RESPOND MSG="Filament inserted"

#####################################################################
# 	Fan Control
#####################################################################

## Part Cooling Fan - on EBB Toolhead
[fan]
pin: EBBcan: gpio13
kick_start_time: 0.5
off_below: 0.10

## Hotend Fan - on EBB Toolhead
[heater_fan hotend_fan]
pin: EBBcan: gpio14
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0

## Electronics Bay fans replaced by skirt_fan_1 (PF8) and skirt_fan_2 (PF6) below

## Keep this one if you have a fan here for the Manta board itself
#[heater_fan controller_fan]
#pin: PF4  # Fan2
#kick_start_time: 0.5
#heater: heater_bed
#heater_temp: 45.0

## Exhaust fan - commented out (not in use)
#[heater_fan exhaust_fan]
#pin: PF8
#max_power: 1.0
#shutdown_speed: 0.0
#kick_start_time: 5.0
#heater: heater_bed
#heater_temp: 60
#fan_speed: 1.0

## Nevermore filter - Manta Fan1 (PF9)
## Manual speed slider in Mainsail + auto control via macros
[fan_generic nevermore]
pin: PF9
kick_start_time: 0.5
off_below: 0.10

## Skirt Fan 1 - Manta Fan3 (PF8)
[fan_generic skirt_fan_1]
pin: PF8
kick_start_time: 0.5
off_below: 0.10

## Skirt Fan 2 - Manta Fan2 (PF6)
## Note: your original config had PA6 labelled as Fan4 which never worked - corrected to PF6
[fan_generic skirt_fan_2]
pin: PF6
kick_start_time: 0.5
off_below: 0.10

## Skirt fan shutdown delayed gcode - called by PRINT_END and monitor loop
[delayed_gcode skirt_fans_shutoff]
gcode:
    SET_FAN_SPEED FAN=skirt_fan_1 SPEED=0
    SET_FAN_SPEED FAN=skirt_fan_2 SPEED=0

## Nevermore shutdown delayed gcode - called by PRINT_END
## Runs for 5 minutes after print end to clear fumes, then shuts off
[delayed_gcode nevermore_shutoff]
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=0

## Skirt fan monitor - polls every 30 seconds
## Turns fans on when printing OR bed > 45C
## Turns fans off when bed cools below 40C and not printing
## When printer shuts down, Klipper stops all delayed gcodes and zeros all pins automatically
[delayed_gcode monitor_skirt_fans]
initial_duration: 10
gcode:
    {% set bed_temp = printer.heater_bed.temperature %}
    {% set printing = printer.print_stats.state == "printing" %}
    {% if printing or bed_temp > 45 %}
        SET_FAN_SPEED FAN=skirt_fan_1 SPEED=0.8
        SET_FAN_SPEED FAN=skirt_fan_2 SPEED=0.8
    {% elif bed_temp < 40 and not printing %}
        SET_FAN_SPEED FAN=skirt_fan_1 SPEED=0
        SET_FAN_SPEED FAN=skirt_fan_2 SPEED=0
    {% endif %}
    UPDATE_DELAYED_GCODE ID=monitor_skirt_fans DURATION=30

#####################################################################
# 	LED Control
#####################################################################

[output_pin caselight]
# Chamber Lighting - HE2 Connector (Optional)
pin: PA3
pwm:true
shutdown_value: 0
value:1
cycle_time: 0.01

#####################################################################
# 	Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 1800

[safe_z_home]
##	XY Location of the Z Endstop Switch
##	Update -10,-10 to the XY coordinates of your endstop pin 
##	(such as 157,305) after going through Z Endstop Pin
##	Location Definition step.
home_xy_position:175,175
speed:100
z_hop:10

[quad_gantry_level]
##	Use QUAD_GANTRY_LEVEL to level a gantry.
##	Min & Max gantry corners - measure from nozzle at MIN (0,0) and 
##	MAX (250, 250), (300,300), or (350,350) depending on your printer size
##	to respective belt positions

#--------------------------------------------------------------------
##	Gantry Corners for 250mm Build
##	Uncomment for 250mm build
#gantry_corners:
#	-60,-10
#	310, 320
##	Probe points
#points:
#	50,25
#	50,175
#	200,175
#	200,25
	
##	Gantry Corners for 300mm Build
##	Uncomment for 300mm build
#gantry_corners:
#	-60,-10
#	360,370
##	Probe points
#points:
#	50,25
#	50,225
#	250,225
#	250,25

##	Gantry Corners for 350mm Build
##	Uncomment for 350mm build
gantry_corners:
	-60,-10
	410,420
#	Probe points
points:
	50,25
	50,275
	300,275
	300,25

#--------------------------------------------------------------------
speed: 100
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.006
max_adjust: 10

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE7, EXP1_2=PG1,
    EXP1_3=PG0, EXP1_4=PF15,
    EXP1_5=PF14, EXP1_6=PF13,    # Slot in the socket on this side
    EXP1_7=PF12, EXP1_8=PF11,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PE13, EXP2_2=PE12,
    EXP2_3=PE15, EXP2_4=PE11,
    EXP2_5=PE10, EXP2_6=PE14,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>

# See the sample-lcd.cfg file for definitions of common LCD displays.

#####################################################################
# 	Displays
#####################################################################

## 	Uncomment the display that you have
#--------------------------------------------------------------------

#[display]
##	RepRapDiscount 128x64 Full Graphic Smart Controller
#lcd_type: st7920
#cs_pin: EXP1_4
#sclk_pin: EXP1_5
#sid_pin: EXP1_3
#menu_timeout: 40
#encoder_pins: ^EXP2_5, ^EXP2_3
#click_pin: ^!EXP1_2

#[output_pin beeper]
#pin: EXP1_1

#--------------------------------------------------------------------

[display]
#	mini12864 LCD Display
lcd_type: uc1701
cs_pin: EXP1_3
a0_pin: EXP1_4
rst_pin: EXP1_5
encoder_pins: ^EXP2_5, ^EXP2_3
click_pin: ^!EXP1_2
contrast: 63
spi_software_miso_pin: EXP2_1
spi_software_mosi_pin: EXP2_6
spi_software_sclk_pin: EXP2_2

[neopixel btt_mini12864]
#	To control Neopixel RGB in mini12864 display
pin: EXP1_6
chain_count: 3
initial_RED: 0.1
initial_GREEN: 0.5
initial_BLUE: 0.0
color_order: RGB

##	Set RGB values on boot up for each Neopixel. 
##	Index 1 = display, Index 2 and 3 = Knob
[delayed_gcode setdisplayneopixel]
initial_duration: 1
gcode:
       SET_LED LED=btt_mini12864 RED=1 GREEN=1 BLUE=1 INDEX=1 TRANSMIT=0
       SET_LED LED=btt_mini12864 RED=1 GREEN=0 BLUE=0 INDEX=2 TRANSMIT=0
       SET_LED LED=btt_mini12864 RED=1 GREEN=0 BLUE=0 INDEX=3 

#--------------------------------------------------------------------


#####################################################################
# 	Macros
#####################################################################

[gcode_macro G32]
gcode:
    BED_MESH_CLEAR
    G28
    QUAD_GANTRY_LEVEL
    G28
    ##	Uncomment for for your size printer:
    #--------------------------------------------------------------------
    ##	Uncomment for 250mm build
    #G0 X125 Y125 Z30 F3600
    
    ##	Uncomment for 300 build
    #G0 X150 Y150 Z30 F3600
    
    ##	Uncomment for 350mm build
    G0 X175 Y175 Z30 F3600
    #--------------------------------------------------------------------

## Helper macro to set both skirt fans at once
[gcode_macro SET_SKIRT_FANS]
gcode:
    {% set SPEED = params.SPEED|default(0)|float %}
    SET_FAN_SPEED FAN=skirt_fan_1 SPEED={SPEED}
    SET_FAN_SPEED FAN=skirt_fan_2 SPEED={SPEED}
   
[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(200)|float %}
    
    RESPOND MSG="Starting print - Bed:{BED_TEMP} Extruder:{EXTRUDER_TEMP}"
    
    # Only heat the bed at start
    M140 S{BED_TEMP}

    # Home all axes
    G28
    
    RESPOND MSG="Waiting for bed temperature"
    M190 S{BED_TEMP}

    # Add a 2 minute heat soak
    RESPOND MSG="Heat soaking for 2 minutes"
    G4 P120000
    
    RESPOND MSG="Running QGL"
    QUAD_GANTRY_LEVEL
    
    # Home Z again after QGL
    G28 Z
    
    # Create bed mesh
    RESPOND MSG="Creating bed mesh"
    BED_MESH_CALIBRATE
    
    RESPOND MSG="Moving to purge position"
    G0 Z10 F3000
    G0 X175 Y50 F12000
    G0 Z0.3 F3000
    
    RESPOND MSG="Heating extruder to {EXTRUDER_TEMP}"
    M109 S{EXTRUDER_TEMP}

    # Start nevermore filter and skirt fans now that we're printing
    SET_FAN_SPEED FAN=nevermore SPEED=1.0
    SET_SKIRT_FANS SPEED=0.8
    
    RESPOND MSG="Drawing purge line"
    G92 E0
    G1 X225 Y10 E10 F1000
    G1 X225 Y10.3 F12000
    G1 X175 Y10.3 E20 F1000
    G92 E0
    G1 Z2 F3000
    
    # Move to front left before print starts
    G90
    G0 X0 Y0 Z10 F12000
    
    RESPOND MSG="PRINT_START complete"

[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    SAVE_GCODE_STATE NAME=STATE_PRINT_END

    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-10.0 F3600                ; retract filament

    G91                            ; relative positioning
    G0 Z1.00 X20.0 Y20.0 F20000    ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    M107                           ; turn off fan

    # Run nevermore for 5 minutes after print to clear fumes, then shut off
    UPDATE_DELAYED_GCODE ID=nevermore_shutoff DURATION=300

    # Keep skirt fans running for 2 minutes to cool the chamber, then shut off
    # The monitor loop will also naturally shut them off once bed cools below 40C
    UPDATE_DELAYED_GCODE ID=skirt_fans_shutoff DURATION=120

    G1 Z2 F3000                    ; move nozzle up 2mm
    G90                            ; absolute positioning
    G0  X125 Y250 F3600            ; park nozzle at rear
    BED_MESH_CLEAR
    
    # The purpose of the SAVE_GCODE_STATE/RESTORE_GCODE_STATE
    # command pair is to restore the printer's coordinate system
    # and speed settings since the commands above change them.
    # However, to prevent any accidental, unintentional toolhead
    # moves when restoring the state, explicitly set MOVE=0.
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END MOVE=0

